  num_train_episodes: 200
  observation_mode: history_with_private_state
  observation_window: 5
  policy_init_scale: 0.01
  policy_mode: linear_gaussian
  reward_baseline_decay: 0.95
  steps_per_year: 252
market:
  cov:
  - - 0.04
    - 0.01
    - 0.0
    - -0.01
  - - 0.01
    - 0.03
    - 0.01
    - 0.0
  - - 0.0
    - 0.01
    - 0.05
    - 0.02
  - - -0.01
    - 0.0
    - 0.02
    - 0.06
  mu:
  - 0.05
  - 0.02
  - 0.08
  - -0.01
predictor:
  expert_agent_idx: 0
  expert_noise_std: 0.001
  noise_std: 1.0
  predictor_mode: noisy_oracle
  predictor_window: 20
trust:
  convergence_persistence: 30
  entropy_slope_threshold: 5.0e-05
  entropy_window: 30
  trust_alpha: 0.2
  trust_lambda: 2.0
